<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liam Gibbs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; cursor: pointer; touch-action: none; }
        #score {
            position: fixed; top: 20px; left: 20px;
            color: #fff; font: bold 32px sans-serif;
            user-select: none;
        }
        #play-again {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 16px 48px; font: bold 24px sans-serif;
            background: #fff; color: #000; border: none; border-radius: 8px;
            cursor: pointer; display: none; z-index: 10;
        }
        #play-again:hover { background: #ddd; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <button id="play-again">Play Again</button>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('play-again');

        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const R = 100;
        const G = 0.35;

        let ball = { x: W / 2, y: R, vx: 0, vy: 0 };
        let score = 0;
        let over = false;

        function reset() {
            ball = { x: W / 2, y: R, vx: 0, vy: 0 };
            score = 0;
            over = false;
            scoreEl.textContent = '0';
            btn.style.display = 'none';
        }

        function kick(cx, cy) {
            if (over) return;
            const dx = cx - ball.x;
            const dy = cy - ball.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > R + 10) return;

            score++;
            scoreEl.textContent = score;

            // Push ball away from where you clicked
            const angle = Math.atan2(dy, dx) + Math.PI;
            const power = 14 + Math.random() * 3;
            ball.vx = Math.cos(angle) * power * 0.5;
            ball.vy = Math.sin(angle) * power;
            // Always send it upward
            if (ball.vy > -4) ball.vy = -4;
        }

        function update() {
            if (over) return;
            ball.vy += G;
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.y - R > H) { over = true; btn.style.display = 'block'; return; }

            if (ball.x - R < 0) { ball.x = R; ball.vx *= -0.5; }
            if (ball.x + R > W) { ball.x = W - R; ball.vx *= -0.5; }
            if (ball.y - R < 0) { ball.y = R; ball.vy *= -0.5; }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, R, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            if (over) {
                ctx.fillStyle = 'rgba(255,0,0,0.3)';
                ctx.fillRect(0, 0, W, H);
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            kick(e.clientX - rect.left, e.clientY - rect.top);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            kick(t.clientX - rect.left, t.clientY - rect.top);
        });
        btn.addEventListener('click', reset);

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
